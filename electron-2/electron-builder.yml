appId: com.smokeystack.tagstack
productName: TagStack
directories:
    output: release/${version}
files:
    - dist-electron/**
    - .output/public/**
asarUnpack: ['**/node_modules/better-sqlite3/**']
win:
    target:
        - target: nsis
          arch:
              - x64
nsis:
    oneClick: false
    allowToChangeInstallationDirectory: true
